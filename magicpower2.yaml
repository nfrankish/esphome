substitutions:
  friendly_name: "Magic Mirror Power"
  friendlyname: ${friendly_name}
  deviceicon: "mdi:washing-machine"

esphome:
  name: "magicpower"
  platform: ESP8266
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Hotspot"
    password: !secret failback_password

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:
  password: !secret ota_password


#################################

ota:
  password: !secret ota_password

sensor:
  - platform: wifi_signal
    name: ${friendlyname} Wifi Signal Strength
    update_interval: 60s
  - platform: uptime
    name: ${friendlyname} Uptime

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ${friendlyname} IP
    ssid:
      name: ${friendlyname} SSID
    bssid:
      name: ${friendlyname} BSSID
    mac_address:
      name: ${friendlyname} Mac
  - platform: version
    name: ${friendlyname} ESPHome Version

# Enable time component for use by daily power sensor
time:
  - platform: homeassistant
    id: homeassistant_time
switch:
  - platform: gpio
    name: "Magic Mirror Power"
    pin: GPIO14
    id: socket1
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      then:
        light.turn_on: led1
    on_turn_off:
      then:
        light.turn_off: led1


binary_sensor:
  - platform: gpio
    pin:
      number: GPIO1
      mode:
        input: true
      inverted: true
    name: Button
    on_click:
      min_length: 50ms
      then:
        switch.toggle: socket1
    internal: true

# The LED is directly controlled via the state of the relay with the switch above
light:
  - platform: binary
    name: "LED"
    id: led1
    output: light_output
    internal: true
    restore_mode: RESTORE_DEFAULT_ON

output:
  - id: light_output
    platform: gpio
    inverted: true
    pin: GPIO13

