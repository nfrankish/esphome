substitutions:
  LIGHT_ON_TIME: 20 min
esphome:
  name: planelights
  on_boot:
    priority: 600.00
    then:
      if:
        condition:
          - switch.is_on: relay
        then:
          - switch.turn_off: relay
          - delay: 60s
          - deep_sleep.enter:
        else:
         - switch.turn_on: relay
         - delay: ${LIGHT_ON_TIME}
         - switch.turn_off: relay
         - delay: 2s
         - switch.turn_on: relay
         - delay: 4s
         - switch.turn_off: relay
         - delay: 2s
         - switch.turn_on: relay
         - delay: 4s
         - switch.turn_off: relay
         - delay: 2s
         - switch.turn_on: relay
         - delay: 120s
         - switch.turn_off: relay
         - deep_sleep.enter:


esp8266:
  board: esp12e
  restore_from_flash: true


# Use the red LED in the device as a status LED, which will blink if there are warnings (slow) or errors (fast)
#status_led:
#  pin:
#    number: GPIO16
#    inverted: True

# relay output, exposed as switch in Home Assistant
switch:
  - platform: gpio
    pin: GPIO5
    name: Relay
    id: relay
    restore_mode: RESTORE_DEFAULT_OFF


deep_sleep:
  #  run_duration: 30 min
  #sleep_duration: 0s
# Enable logging
logger:
  level: DEBUG

debug:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

ota:
   password: !secret ota_password

