substitutions:
    friendly_name: "Garage Light Switch"

esphome:
  name: garagelight2
  platform: ESP8266
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Garagelight Fallback Hotspot"
    password: !secret failback_password

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:
  password: !secret ota_password

ota:
  password: !secret ota_password

status_led:
  pin:
    number: GPIO4
    inverted: True

output:
  # Top (or only) button
  - platform: gpio
    pin: GPIO13
    id: relay2

  - platform: gpio
    pin: GPIO14
    id: relay1

light:
  # Top (or only) button
  - platform: binary
    name: "Garage Fan"
    output: relay1
    id: fan1

  - platform: binary
    name: "Garage Light"
    output: relay2
    id: light1

# Buttons
binary_sensor:
  # Top (or only) button
  - platform: gpio
    pin:
      number: GPIO16
#      mode: INPUT_PULLUP
      inverted: True
    name: "Garage Light Button"
    #toggle relay on push
    on_press:
      - light.toggle: light1

  - platform: gpio
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: True
    name: "Garage Fan Button"
    #toggle relay on push
    on_press:
      - light.toggle: fan1


switch:
- platform: restart
  name: "${friendly_name} REBOOT"
